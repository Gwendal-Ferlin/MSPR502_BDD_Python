# TrueNAS / serveur : bases vides, pas de montage init (évite Permission denied sur ZFS).
# Après "docker compose up", initialiser les BDD à la main (voir README) :
#
# 1) Postgres utilisateur (schéma + seed si besoin) :
#   docker cp init/postgres-utilisateur/01_schema.sql postgres-utilisateur:/tmp/
#   docker exec postgres-utilisateur psql -U utilisateur_user -d utilisateur_db -f /tmp/01_schema.sql
#   docker cp init/postgres-utilisateur/02_seed.sql postgres-utilisateur:/tmp/
#   docker exec postgres-utilisateur psql -U utilisateur_user -d utilisateur_db -f /tmp/02_seed.sql
#
# 2) Postgres santé (schéma + seed si besoin) :
#   docker cp init/postgres-sante/01_schema.sql postgres-sante:/tmp/
#   docker exec postgres-sante psql -U sante_user -d sante_db -f /tmp/01_schema.sql
#   docker cp init/postgres-sante/02_seed.sql postgres-sante:/tmp/
#   docker exec postgres-sante psql -U sante_user -d sante_db -f /tmp/02_seed.sql
#
# 3) Postgres gamification (schéma + seed si besoin) :
#   docker cp init/postgres-gamification/01_schema.sql postgres-gamification:/tmp/
#   docker exec postgres-gamification psql -U gamification_user -d gamification_db -f /tmp/01_schema.sql
#   docker cp init/postgres-gamification/02_seed.sql postgres-gamification:/tmp/
#   docker exec postgres-gamification psql -U gamification_user -d gamification_db -f /tmp/02_seed.sql
#
# 4) MongoDB logs :
#   docker cp init/mongodb-logs/init.js mongodb-logs:/tmp/
#   docker exec mongodb-logs mongosh logs_config --file /tmp/init.js
#
# 5) MongoDB reco :
#   docker cp init/mongodb-reco/init.js mongodb-reco:/tmp/
#   docker exec mongodb-reco mongosh reco --file /tmp/init.js

services:
  postgres-utilisateur:
    image: postgres:16-alpine
    container_name: postgres-utilisateur
    environment:
      POSTGRES_USER: utilisateur_user
      POSTGRES_PASSWORD: utilisateur_password
      POSTGRES_DB: utilisateur_db
    ports:
      - "15432:5432"
    volumes:
      - pg_utilisateur_data:/var/lib/postgresql/data
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d utilisateur_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres-sante:
    image: postgres:16-alpine
    container_name: postgres-sante
    environment:
      POSTGRES_USER: sante_user
      POSTGRES_PASSWORD: sante_password
      POSTGRES_DB: sante_db
    ports:
      - "15433:5432"
    volumes:
      - pg_sante_data:/var/lib/postgresql/data
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d sante_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres-gamification:
    image: postgres:16-alpine
    container_name: postgres-gamification
    environment:
      POSTGRES_USER: gamification_user
      POSTGRES_PASSWORD: gamification_password
      POSTGRES_DB: gamification_db
    ports:
      - "15434:5432"
    volumes:
      - pg_gamification_data:/var/lib/postgresql/data
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d gamification_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb-logs:
    image: mongo:7
    container_name: mongodb-logs
    environment:
      MONGO_INITDB_DATABASE: logs_config
    ports:
      - "27017:27017"
    volumes:
      - mongo_logs_data:/data/db
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb-reco:
    image: mongo:7
    container_name: mongodb-reco
    environment:
      MONGO_INITDB_DATABASE: reco
    ports:
      - "27018:27017"
    volumes:
      - mongo_reco_data:/data/db
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api
    ports:
      - "18000:8000"
    environment:
      POSTGRES_UTILISATEUR_HOST: postgres-utilisateur
      POSTGRES_UTILISATEUR_PORT: "5432"
      POSTGRES_UTILISATEUR_USER: utilisateur_user
      POSTGRES_UTILISATEUR_PASSWORD: utilisateur_password
      POSTGRES_SANTE_HOST: postgres-sante
      POSTGRES_SANTE_PORT: "5432"
      POSTGRES_SANTE_USER: sante_user
      POSTGRES_SANTE_PASSWORD: sante_password
      POSTGRES_GAMIFICATION_HOST: postgres-gamification
      POSTGRES_GAMIFICATION_PORT: "5432"
      POSTGRES_GAMIFICATION_USER: gamification_user
      POSTGRES_GAMIFICATION_PASSWORD: gamification_password
      MONGODB_LOGS_HOST: mongodb-logs
      MONGODB_LOGS_PORT: "27017"
      MONGODB_RECO_HOST: mongodb-reco
      MONGODB_RECO_PORT: "27017"
      JWT_SECRET: CHANGE_ME_JWT_SECRET
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      # Hugging Face (scripts ia-reco) : lues depuis le .env à la racine du projet lors du « docker compose »
      # (substitution ${...}). Mettre HF_API_TOKEN dans ce .env — pas dans ia-reco/.env seul (non monté dans l’image).
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      HF_MODEL_ID: ${HF_MODEL_ID:-Qwen/Qwen2.5-7B-Instruct}
      HF_TIMEOUT_SEC: ${HF_TIMEOUT_SEC:-45}
    depends_on:
      postgres-utilisateur:
        condition: service_healthy
      postgres-sante:
        condition: service_healthy
      postgres-gamification:
        condition: service_healthy
      mongodb-logs:
        condition: service_healthy
      mongodb-reco:
        condition: service_healthy
    networks:
      - mspr502-network

networks:
  mspr502-network:
    driver: bridge

volumes:
  pg_utilisateur_data:
  pg_sante_data:
  pg_gamification_data:
  mongo_logs_data:
  mongo_reco_data:
