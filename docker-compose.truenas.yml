# TrueNAS Scale — Install via YAML. Bases vides (aucun service init).
# Adapter le chemin context si besoin : /mnt/MainPool/School/Mspr502

services:
  postgres-utilisateur:
    image: postgres:16-alpine
    container_name: postgres-utilisateur
    environment:
      POSTGRES_USER: utilisateur_user
      POSTGRES_PASSWORD: utilisateur_password
      POSTGRES_DB: utilisateur_db
    ports:
      - "15432:5432"
    volumes:
      - pg_utilisateur_data:/var/lib/postgresql/data
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d utilisateur_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-sante:
    image: postgres:16-alpine
    container_name: postgres-sante
    environment:
      POSTGRES_USER: sante_user
      POSTGRES_PASSWORD: sante_password
      POSTGRES_DB: sante_db
    ports:
      - "15433:5432"
    volumes:
      - pg_sante_data:/var/lib/postgresql/data
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d sante_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb-logs:
    image: mongo:7
    container_name: mongodb-logs
    environment:
      MONGO_INITDB_DATABASE: logs_config
    ports:
      - "27017:27017"
    volumes:
      - mongo_logs_data:/data/db
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb-reco:
    image: mongo:7
    container_name: mongodb-reco
    environment:
      MONGO_INITDB_DATABASE: reco
    ports:
      - "27018:27017"
    volumes:
      - mongo_reco_data:/data/db
    networks:
      - mspr502-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: /mnt/MainPool/School/Mspr502
      dockerfile: api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_UTILISATEUR_HOST: postgres-utilisateur
      POSTGRES_UTILISATEUR_PORT: "5432"
      POSTGRES_UTILISATEUR_USER: utilisateur_user
      POSTGRES_UTILISATEUR_PASSWORD: utilisateur_password
      POSTGRES_UTILISATEUR_DB: utilisateur_db
      POSTGRES_SANTE_HOST: postgres-sante
      POSTGRES_SANTE_PORT: "5432"
      POSTGRES_SANTE_USER: sante_user
      POSTGRES_SANTE_PASSWORD: sante_password
      POSTGRES_SANTE_DB: sante_db
      MONGODB_LOGS_HOST: mongodb-logs
      MONGODB_LOGS_PORT: "27017"
      MONGODB_LOGS_DB: logs_config
      MONGODB_RECO_HOST: mongodb-reco
      MONGODB_RECO_PORT: "27017"
      MONGODB_RECO_DB: reco
      JWT_SECRET: CHANGE_ME_JWT_SECRET
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
    depends_on:
      postgres-utilisateur:
        condition: service_healthy
      postgres-sante:
        condition: service_healthy
      mongodb-logs:
        condition: service_healthy
      mongodb-reco:
        condition: service_healthy
    networks:
      - mspr502-network

networks:
  mspr502-network:
    driver: bridge

volumes:
  pg_utilisateur_data:
  pg_sante_data:
  mongo_logs_data:
  mongo_reco_data:
